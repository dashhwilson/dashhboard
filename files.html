<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Files | Digital Dashh</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root{--navy:#1c1c3a;--yellow:#ffe066;--purple:#6c79db;--purple-light:#eef1fb;--green:#4caf82;--red:#e55a5a;--orange:#f5a623;--bg:#f0f4f8;--white:#fff;--muted:#7a7a9a;--border:#e4e4f0;--shadow:0 4px 16px rgba(28,28,58,0.07);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--navy);}
    .header{background:var(--navy);color:white;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
    .header-left{display:flex;align-items:center;gap:14px;}
    .brand{font-size:18px;font-weight:900;}.brand span{color:var(--yellow);}
    .btn-ghost{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 14px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background 0.2s;}
    .btn-ghost:hover{background:rgba(255,255,255,0.2);}
    .header-right{display:flex;align-items:center;gap:10px;font-size:13px;}
    .nav{background:white;border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;overflow-x:auto;}
    .nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:12px 14px;border-bottom:2px solid transparent;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
    .nav a:hover,.nav a.active{color:var(--navy);border-bottom-color:var(--purple);}
    .page{max-width:1200px;margin:0 auto;padding:28px 28px 60px;}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:200px 1fr;gap:22px;align-items:start;}
    @media(max-width:720px){.layout{grid-template-columns:1fr;}}

    /* SIDEBAR */
    .sidebar{background:var(--white);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:20px;}
    .sidebar-hdr{padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
    .cat-btn{width:100%;background:none;border:none;padding:10px 16px;text-align:left;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.15s,color 0.15s;border-left:3px solid transparent;}
    .cat-btn:hover{background:#fafafe;color:var(--navy);}
    .cat-btn.active{background:var(--purple-light);color:var(--purple);border-left-color:var(--purple);font-weight:800;}
    .cat-count{font-size:11px;font-weight:700;background:#f0f0f8;color:var(--muted);padding:1px 7px;border-radius:9px;}
    .cat-btn.active .cat-count{background:var(--purple);color:white;}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px;}
    .stat{background:var(--white);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);border-top:3px solid var(--border);}
    .stat.c-purple{border-top-color:var(--purple);}.stat.c-green{border-top-color:var(--green);}.stat.c-orange{border-top-color:var(--orange);}
    .stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .stat-val{font-size:20px;font-weight:900;}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
    .toolbar-left{display:flex;gap:8px;align-items:center;}
    .search-inp{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--navy);background:var(--white);width:210px;}
    .search-inp:focus{outline:none;border-color:var(--purple);}
    .toolbar-right{display:flex;gap:8px;}
    .btn-secondary{background:var(--white);color:var(--navy);border:2px solid var(--border);padding:8px 15px;border-radius:9px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .btn-secondary:hover{border-color:var(--purple);}
    .btn-add{background:var(--navy);color:var(--yellow);border:none;padding:9px 18px;border-radius:9px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
    .btn-add:hover{background:#2d2d5a;}

    /* FILE CARDS */
    .file-grid{display:flex;flex-direction:column;gap:10px;}
    .file-card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);padding:14px 18px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow 0.2s;}
    .file-card:hover{box-shadow:0 6px 22px rgba(28,28,58,0.1);}
    .file-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .fi-drive{background:#e8f5ee;}.fi-dropbox{background:#e8f0ff;}.fi-pdf{background:#fff0f0;}.fi-sheet{background:#eafaf1;}.fi-slides{background:#fff8e0;}.fi-doc{background:#e8f0ff;}.fi-other{background:#f4f4fb;}
    .file-info{flex:1;min-width:0;}
    .file-name{font-size:14px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .file-name a{color:var(--navy);text-decoration:none;}
    .file-name a:hover{color:var(--purple);text-decoration:underline;}
    .file-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:3px;}
    .file-note{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;}
    .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;}
    .b-budget{background:#fff8e0;color:#9a7000;}
    .b-av{background:var(--purple-light);color:var(--purple);}
    .b-content{background:#fdf0f5;color:#cc3366;}
    .b-venues{background:#e8f5ee;color:var(--green);}
    .b-sponsor{background:#fff0e8;color:#cc6600;}
    .b-merch{background:#f0f4ff;color:#4060cc;}
    .b-registration{background:#e8fbf5;color:#2d8a60;}
    .b-tasks{background:#f4f4fb;color:var(--muted);}
    .b-other{background:#f4f4fb;color:var(--muted);}
    .date-lbl{font-size:11px;color:var(--muted);font-weight:600;}
    .synced-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:3px;}
    .sync-lbl{font-size:10px;color:var(--green);font-weight:700;}
    .file-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;}
    .btn-open{background:var(--purple-light);color:var(--purple);border:none;padding:6px 12px;border-radius:7px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;}
    .btn-open:hover{background:#dde3f8;}
    .btn-edit{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:4px;}
    .btn-edit:hover{color:var(--purple);}
    .btn-rm{background:none;border:none;color:#ccc;font-size:13px;cursor:pointer;padding:4px 6px;border-radius:4px;}
    .btn-rm:hover{color:var(--red);}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:white;border-radius:16px;padding:26px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);transform:scale(0.92);transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);}
    .modal-overlay.open .modal{transform:scale(1);}
    .modal h3{font-size:17px;font-weight:800;margin-bottom:16px;}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .modal-actions{display:flex;gap:10px;justify-content:space-between;margin-top:16px;flex-wrap:wrap;}
    .fi-lbl{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
    .fi{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--navy);background:#fafafa;margin-bottom:10px;transition:border-color 0.2s;}
    .fi:focus{outline:none;border-color:var(--purple);background:white;}
    .fi-ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--navy);resize:vertical;min-height:60px;background:#fafafa;margin-bottom:10px;}
    .fi-ta:focus{outline:none;border-color:var(--purple);background:white;}
    .btn-primary{background:var(--navy);color:var(--yellow);border:none;padding:10px 20px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
    .btn-cancel{background:#f0f0f0;color:var(--navy);border:none;padding:10px 18px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-delete{background:none;border:1.5px solid var(--border);color:var(--red);padding:10px 16px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
    .sync-status{font-size:12px;margin-top:8px;font-weight:600;}
    .sync-status.ok{color:var(--green);}.sync-status.err{color:var(--red);}.sync-status.loading{color:var(--muted);}

    /* GOOGLE SHEET LINK */
    .sheet-bar{background:var(--white);border-radius:12px;box-shadow:var(--shadow);padding:13px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .sheet-bar-left{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;}
    .sheet-dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .btn-sheet{background:#0f9d58;color:white;border:none;padding:7px 14px;border-radius:7px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;}

    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
    .empty .ei{font-size:36px;margin-bottom:8px;}
    #page-loader{display:flex;justify-content:center;align-items:center;height:60vh;color:var(--muted);font-size:15px;font-weight:600;flex-direction:column;gap:10px;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:white;padding:13px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,0.15);transform:translateY(80px);opacity:0;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1),opacity 0.3s;z-index:999;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{border-left:4px solid var(--green);}.toast.error{border-left:4px solid var(--red);}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand">Digital <span>Dashh</span></div>
    <a href="index.html" class="btn-ghost">← Dashboard</a>
  </div>
  <div class="header-right">
    <span id="user-email" style="opacity:0.65;"></span>
    <button class="btn-ghost" onclick="logout()">Logout</button>
  </div>
</div>

<nav class="nav">
  <a href="overview.html">Overview</a>

<div id="page-loader"><div style="font-size:36px;">📁</div>Loading Files...</div>

<div class="page" id="page-content" style="display:none;">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;">
    <div>
      <h1 style="font-size:26px;font-weight:900;letter-spacing:-0.02em;">File <span style="color:var(--purple);">Library</span></h1>
      <div style="font-size:13px;color:var(--muted);margin-top:3px;" id="event-sub">—</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat c-purple"><div class="stat-lbl">Total Files</div><div class="stat-val" id="st-total">0</div></div>
    <div class="stat c-green"><div class="stat-lbl">Synced to Sheet</div><div class="stat-val" id="st-synced">0</div></div>
    <div class="stat c-orange"><div class="stat-lbl">Categories</div><div class="stat-val" id="st-cats">0</div></div>
  </div>

  <!-- GOOGLE SHEET BAR -->
  <div class="sheet-bar">
    <div class="sheet-bar-left">
      <div class="sheet-dot"></div>
      <span>Connected to Google Sheet</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-secondary" onclick="exportCSV()">📤 Export CSV</button>
      <a href="https://docs.google.com/spreadsheets/d/1sTUZ0Eezf0c_mMXFBk0oNbArQKbi-M8FEVjZFHZXCx8/edit" target="_blank" class="btn-sheet">📄 View Google Sheet</a>
    </div>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-hdr">Categories</div>
      <button class="cat-btn active" onclick="setCat('all',this)">
        <span>📁 All Files</span><span class="cat-count" id="cnt-all">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Budget',this)">
        <span>💰 Budget</span><span class="cat-count" id="cnt-Budget">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('AV',this)">
        <span>🎬 AV</span><span class="cat-count" id="cnt-AV">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Content',this)">
        <span>🎨 Content</span><span class="cat-count" id="cnt-Content">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Venues',this)">
        <span>📍 Venues</span><span class="cat-count" id="cnt-Venues">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Sponsor',this)">
        <span>🤝 Sponsor</span><span class="cat-count" id="cnt-Sponsor">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Merch',this)">
        <span>👕 Merch</span><span class="cat-count" id="cnt-Merch">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Registration',this)">
        <span>🎟️ Registration</span><span class="cat-count" id="cnt-Registration">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Tasks',this)">
        <span>✅ Tasks</span><span class="cat-count" id="cnt-Tasks">0</span>
      </button>
      <button class="cat-btn" onclick="setCat('Other',this)">
        <span>📎 Other</span><span class="cat-count" id="cnt-Other">0</span>
      </button>
    </div>

    <!-- MAIN -->
    <div>
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-inp" placeholder="🔍 Search files..." oninput="searchQ=this.value;renderFiles();" />
        </div>
        <div class="toolbar-right">
          <button class="btn-add" onclick="openModal()">+ Add File Link</button>
        </div>
      </div>
      <div class="file-grid" id="file-grid"></div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="file-modal">
  <div class="modal">
    <h3 id="modal-title">📎 Add File Link</h3>
    <label class="fi-lbl">File Name *</label>
    <input class="fi" id="f-name" placeholder="e.g. SponsorDeck_v2.pdf" />
    <label class="fi-lbl">URL / Link *</label>
    <input class="fi" id="f-url" type="url" placeholder="https://drive.google.com/..." />
    <div class="modal-row">
      <div>
        <label class="fi-lbl">Category</label>
        <select class="fi" id="f-cat" style="margin:0;">
          <option>Budget</option><option>AV</option><option>Content</option>
          <option>Venues</option><option>Sponsor</option><option>Merch</option>
          <option>Registration</option><option>Tasks</option><option>Other</option>
        </select>
      </div>
      <div>
        <label class="fi-lbl">File Type</label>
        <select class="fi" id="f-type" style="margin:0;">
          <option>Google Drive</option><option>Google Sheet</option><option>Google Slides</option>
          <option>Google Doc</option><option>Dropbox</option><option>PDF</option><option>Other</option>
        </select>
      </div>
    </div>
    <label class="fi-lbl" style="margin-top:10px;">Notes</label>
    <textarea class="fi-ta" id="f-notes" placeholder="What's in this file? Any important context..."></textarea>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <input type="checkbox" id="f-sync" style="width:16px;height:16px;cursor:pointer;" checked />
      <label for="f-sync" style="font-size:13px;font-weight:600;cursor:pointer;">Sync to Google Sheet</label>
    </div>
    <div class="sync-status" id="sync-status"></div>
    <div class="modal-actions">
      <button class="btn-delete" id="modal-del-btn" style="display:none;" onclick="deleteFile()">🗑 Delete</button>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveFile()">💾 Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const firebaseConfig={apiKey:"AIzaSyCPocwJXL0kXaQczyyTUEib0c8oVsP-x-c",authDomain:"digitaldashh.com",projectId:"quantum-beach-394503",storageBucket:"quantum-beach-394503.firebasestorage.app",messagingSenderId:"1002514430184",appId:"1:1002514430184:web:07ffbe7190df810494b15d"};
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(),db=firebase.firestore();

  const SHEETS_URL='https://script.google.com/macros/s/AKfycbzB-5AScjwiCc4mktzFb48KsGyDpGdSOCR6CayndOVG0_EnObTkWmJiYfV7EszEZ00/exec';

  let currentUser=null,activeEventId=localStorage.getItem('activeEventId');
  let files=[],activeCat='all',searchQ='',editingIdx=null,authDone=false;

  const CAT_BADGE={Budget:'b-budget',AV:'b-av',Content:'b-content',Venues:'b-venues',Sponsor:'b-sponsor',Merch:'b-merch',Registration:'b-registration',Tasks:'b-tasks',Other:'b-other'};
  const TYPE_ICON={'Google Drive':'📂','Google Sheet':'📊','Google Slides':'📑','Google Doc':'📝','Dropbox':'📦','PDF':'📄','Other':'📎'};
  const TYPE_BG={'Google Drive':'fi-drive','Google Sheet':'fi-sheet','Google Slides':'fi-slides','Google Doc':'fi-doc','Dropbox':'fi-dropbox','PDF':'fi-pdf','Other':'fi-other'};

  auth.onAuthStateChanged(user=>{
    if(!user){window.location.href='login.html';return;}
    currentUser=user;
    document.getElementById('user-email').textContent=user.email;
    activeEventId=localStorage.getItem('activeEventId');
    if(!authDone){authDone=true;load();}
  });

  function load(){
    if(!activeEventId){window.location.href='events.html';return;}
    db.collection('users').doc(currentUser.uid).collection('events').doc(activeEventId).get()
      .then(doc=>{
        show();
        if(!doc.exists){showToast('Event not found.','error');return;}
        const d=doc.data();
        document.getElementById('event-sub').textContent=d.eventName||'Untitled Event';
        files=d.files||[];
        renderAll();
      }).catch(err=>{show();showToast('Error: '+err.message,'error');});
  }

  function show(){document.getElementById('page-loader').style.display='none';document.getElementById('page-content').style.display='block';}

  function renderAll(){updateStats();updateCounts();renderFiles();}

  // ── STATS ──
  function updateStats(){
    const synced=files.filter(f=>f.synced).length;
    const cats=new Set(files.map(f=>f.category)).size;
    document.getElementById('st-total').textContent=files.length;
    document.getElementById('st-synced').textContent=synced;
    document.getElementById('st-cats').textContent=cats;
  }

  function updateCounts(){
    const CATS=['Budget','AV','Content','Venues','Sponsor','Merch','Registration','Tasks','Other'];
    document.getElementById('cnt-all').textContent=files.length;
    CATS.forEach(c=>{
      const el=document.getElementById('cnt-'+c);
      if(el) el.textContent=files.filter(f=>f.category===c).length;
    });
  }

  // ── CATEGORY FILTER ──
  function setCat(cat,btn){
    activeCat=cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderFiles();
  }

  function getFiltered(){
    let f=[...files];
    if(activeCat!=='all') f=f.filter(x=>x.category===activeCat);
    if(searchQ) f=f.filter(x=>(x.name||'').toLowerCase().includes(searchQ.toLowerCase())||(x.notes||'').toLowerCase().includes(searchQ.toLowerCase()));
    return f.sort((a,b)=>new Date(b.addedAt||0)-new Date(a.addedAt||0));
  }

  // ── RENDER FILES ──
  function renderFiles(){
    const grid=document.getElementById('file-grid');
    const filtered=getFiltered();
    if(!filtered.length){
      grid.innerHTML=`<div class="empty"><div class="ei">📁</div>${activeCat==='all'&&!searchQ?'No files yet. Click <strong>+ Add File Link</strong> to get started.':'No files match this filter.'}</div>`;
      return;
    }
    grid.innerHTML=filtered.map(f=>{
      const si=files.indexOf(f);
      const icon=TYPE_ICON[f.type]||'📎';
      const bg=TYPE_BG[f.type]||'fi-other';
      const catBadge=CAT_BADGE[f.category]||'b-other';
      const dateStr=f.addedAt?new Date(f.addedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      return `<div class="file-card">
        <div class="file-icon ${bg}">${icon}</div>
        <div class="file-info">
          <div class="file-name">
            ${f.url?`<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.name||'Untitled')}</a>`:esc(f.name||'Untitled')}
          </div>
          <div class="file-meta">
            <span class="badge ${catBadge}">${esc(f.category||'Other')}</span>
            <span class="badge b-other">${esc(f.type||'Other')}</span>
            ${dateStr?`<span class="date-lbl">Added ${dateStr}</span>`:''}
            ${f.synced?`<span class="sync-lbl"><span class="synced-dot"></span>Synced</span>`:''}
          </div>
          ${f.notes?`<div class="file-note">${esc(f.notes)}</div>`:''}
        </div>
        <div class="file-actions">
          ${f.url?`<a href="${esc(f.url)}" target="_blank" rel="noopener" class="btn-open">Open ↗</a>`:''}
          <button class="btn-edit" onclick="openModal(${si})" title="Edit">✏️</button>
          <button class="btn-rm" onclick="removeFile(${si})" title="Remove">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── MODAL ──
  function openModal(si=null){
    editingIdx=si;
    const f=si!==null?files[si]:{};
    document.getElementById('modal-title').textContent=si!==null?'✏️ Edit File':'📎 Add File Link';
    document.getElementById('f-name').value=f.name||'';
    document.getElementById('f-url').value=f.url||'';
    document.getElementById('f-cat').value=f.category||'Other';
    document.getElementById('f-type').value=f.type||'Google Drive';
    document.getElementById('f-notes').value=f.notes||'';
    document.getElementById('f-sync').checked=si===null?true:(f.synced||false);
    document.getElementById('sync-status').textContent='';
    document.getElementById('modal-del-btn').style.display=si!==null?'block':'none';
    document.getElementById('file-modal').classList.add('open');
    setTimeout(()=>document.getElementById('f-name').focus(),100);
  }
  function closeModal(){document.getElementById('file-modal').classList.remove('open');editingIdx=null;}

  function saveFile(){
    const name=document.getElementById('f-name').value.trim();
    const url=document.getElementById('f-url').value.trim();
    if(!name){showToast('File name required.','error');return;}
    if(!url){showToast('URL required.','error');return;}
    const shouldSync=document.getElementById('f-sync').checked;
    const f={
      name,url,
      category:document.getElementById('f-cat').value,
      type:document.getElementById('f-type').value,
      notes:document.getElementById('f-notes').value.trim(),
      addedAt:editingIdx!==null?(files[editingIdx].addedAt||new Date().toISOString()):new Date().toISOString(),
      synced:editingIdx!==null?files[editingIdx].synced:false
    };
    if(editingIdx!==null) files[editingIdx]={...files[editingIdx],...f};
    else files.push(f);
    const savedIdx=editingIdx!==null?editingIdx:files.length-1;

    // Sync to Google Sheet if checked
    if(shouldSync&&!files[savedIdx].synced){
      document.getElementById('sync-status').textContent='Syncing to Google Sheet...';
      document.getElementById('sync-status').className='sync-status loading';
      syncToSheet(f).then(()=>{
        files[savedIdx].synced=true;
        persistFiles(()=>{closeModal();renderAll();showToast('✓ Saved & synced to Google Sheet!','success');});
      }).catch(()=>{
        // Save anyway even if sync fails
        persistFiles(()=>{closeModal();renderAll();showToast('✓ Saved (sheet sync failed — check connection)','success');});
      });
    } else {
      persistFiles(()=>{closeModal();renderAll();showToast('✓ File saved!','success');});
    }
  }

  function deleteFile(){
    if(editingIdx===null)return;
    if(!confirm(`Remove "${files[editingIdx].name}"?`))return;
    files.splice(editingIdx,1);
    closeModal();
    persistFiles(()=>{renderAll();showToast('🗑 File removed.','success');});
  }

  function removeFile(si){
    if(!confirm(`Remove "${files[si].name}"?`))return;
    files.splice(si,1);
    persistFiles(()=>renderAll());
  }

  // ── GOOGLE SHEET SYNC ──
  function syncToSheet(f){
    return fetch(SHEETS_URL,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        fileName:f.name,
        category:f.category,
        fileType:f.type,
        url:f.url,
        notes:f.notes||'',
        addedAt:new Date(f.addedAt).toLocaleString()
      })
    }).then(r=>{if(!r.ok)throw new Error('Sheet sync failed');return r.text();});
  }

  // ── EXPORT CSV ──
  function exportCSV(){
    if(!files.length){showToast('No files to export.','error');return;}
    const headers=['Name','Category','Type','URL','Notes','Added','Synced'];
    const rows=files.map(f=>[f.name,f.category,f.type,f.url,f.notes||'',f.addedAt?new Date(f.addedAt).toLocaleString():'',f.synced?'Yes':'No']
      .map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
    const csv=[headers.join(','),...rows].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='files.csv';a.click();
    showToast('✓ CSV exported!','success');
  }

  // ── FIRESTORE ──
  function persistFiles(cb){
    if(!currentUser||!activeEventId)return;
    db.collection('users').doc(currentUser.uid).collection('events').doc(activeEventId)
      .update({files}).then(()=>{if(cb)cb();}).catch(err=>showToast('Save failed: '+err.message,'error'));
  }

  // ── UTILS ──
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  let tt;function showToast(m,t='success'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);}
  function logout(){auth.signOut().then(()=>{window.location.href='login.html';});}
</script>
</body>
</html>
