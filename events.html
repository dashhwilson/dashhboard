<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Events | Digital Dashh</title>
  <meta property="og:image" content="http://www.digitaldashh.com/assets/DDBLogo.jpeg" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Digital Dashh EventBoard" />
  <meta property="og:description" content="A branded command center for event producers." />

  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #1c1c3a;
      --yellow: #ffe066;
      --purple: #6c79db;
      --purple-light: #8da5e2;
      --bg: #f0f4f8;
      --white: #ffffff;
      --danger: #e55a5a;
      --success: #4caf82;
      --text-muted: #7a7a9a;
      --card-shadow: 0 4px 20px rgba(28,28,58,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background-color: var(--navy);
      color: white;
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .header-brand span {
      color: var(--yellow);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      opacity: 0.85;
    }
    .btn-logout {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* ── PAGE LAYOUT ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    .page-intro {
      margin-bottom: 40px;
    }
    .page-intro h1 {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .page-intro h1 span {
      color: var(--purple);
    }
    .page-intro p {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
    }

    /* ── TWO COLUMN LAYOUT ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 820px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* ── SECTION HEADERS ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── EVENT CARDS LIST ── */
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .event-card {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .event-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--purple);
      border-radius: 4px 0 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .event-card:hover {
      border-color: var(--purple-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108,121,219,0.14);
    }
    .event-card:hover::before { opacity: 1; }
    .event-card.active-event {
      border-color: var(--purple);
      background: #f5f6ff;
    }
    .event-card.active-event::before { opacity: 1; }

    .event-card-info { flex: 1; min-width: 0; }
    .event-card-name {
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-card-meta {
      display: flex;
      gap: 16px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .event-card-meta span {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .event-card-badges {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-active { background: #e8f5ee; color: #2e7d54; }
    .badge-upcoming { background: #eef1fb; color: var(--purple); }
    .badge-past { background: #f0f0f0; color: #999; }

    .btn-select {
      background: var(--purple);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-select:hover { background: #5a67d8; transform: scale(1.03); }
    .btn-select.selected {
      background: var(--success);
    }

    .btn-delete-event {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .btn-delete-event:hover { color: var(--danger); background: #fff0f0; }

    /* Empty state */
    .empty-state {
      background: var(--white);
      border-radius: 14px;
      padding: 52px 32px;
      text-align: center;
      box-shadow: var(--card-shadow);
      border: 2px dashed #dde;
    }
    .empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-state p { color: var(--text-muted); font-size: 14px; }

    /* Loading skeleton */
    .skeleton-card {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: var(--card-shadow);
    }
    .skeleton-line {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
      margin-bottom: 10px;
    }
    .skeleton-line.wide { width: 60%; }
    .skeleton-line.narrow { width: 35%; height: 11px; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── CREATE EVENT FORM ── */
    .create-panel {
      background: var(--white);
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--card-shadow);
      position: sticky;
      top: 24px;
    }
    .create-panel h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e0e0ee;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      color: var(--navy);
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--purple);
      background: white;
    }
    .form-group textarea { resize: vertical; min-height: 72px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-create {
      width: 100%;
      background: var(--navy);
      color: var(--yellow);
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
      margin-top: 6px;
    }
    .btn-create:hover { background: #2d2d5a; transform: translateY(-1px); }
    .btn-create:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── ACTIVE EVENT BANNER ── */
    .active-banner {
      background: linear-gradient(135deg, var(--navy) 0%, #2d2d5a 100%);
      color: white;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 6px 24px rgba(28,28,58,0.18);
    }
    .active-banner-info { flex: 1; }
    .active-banner-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 4px;
    }
    .active-banner-name {
      font-size: 20px;
      font-weight: 800;
    }
    .active-banner-meta {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 3px;
    }
    .btn-go-dashboard {
      background: var(--yellow);
      color: var(--navy);
      border: none;
      padding: 11px 22px;
      border-radius: 9px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-go-dashboard:hover { background: #ffd633; transform: scale(1.03); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--navy);
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    /* ── CONFIRM MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: scale(0.92);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
    .modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: #f0f0f0;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-confirm-delete {
      background: var(--danger);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">Digital <span>Dashh</span></div>
    <div class="header-right">
      <span id="user-email"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- PAGE -->
  <div class="page">
    <div class="page-intro">
      <h1>Your <span>Events</span></h1>
      <p>Select an event to open its dashboard, or create a new one below.</p>
    </div>

    <!-- Active event banner (shown when one is selected) -->
    <div class="active-banner" id="active-banner" style="display:none;">
      <div class="active-banner-info">
        <div class="active-banner-label">⚡ Currently Active</div>
        <div class="active-banner-name" id="active-banner-name">—</div>
        <div class="active-banner-meta" id="active-banner-meta">—</div>
      </div>
      <a href="index.html" class="btn-go-dashboard">Open Dashboard →</a>
    </div>

    <div class="two-col">
      <!-- LEFT: Events list -->
      <div>
        <div class="section-label">All Events</div>
        <div class="events-list" id="events-list">
          <!-- Skeleton loading state -->
          <div class="skeleton-card" id="skeleton">
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line narrow"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Create event form -->
      <div class="create-panel">
        <h2>✨ Create New Event</h2>

        <div class="form-group">
          <label>Event Name *</label>
          <input type="text" id="new-name" placeholder="e.g. Annual Gala 2026" />
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="new-location" placeholder="e.g. Austin, TX" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="new-date" />
          </div>
          <div class="form-group">
            <label>Capacity</label>
            <input type="number" id="new-capacity" placeholder="e.g. 300" min="1" />
          </div>
        </div>

        <div class="form-group">
          <label>Event Type</label>
          <select id="new-type">
            <option value="">Select type...</option>
            <option value="Conference">Conference</option>
            <option value="Gala">Gala / Awards</option>
            <option value="Corporate">Corporate Meeting</option>
            <option value="Summit">Summit</option>
            <option value="Festival">Festival</option>
            <option value="Trade Show">Trade Show</option>
            <option value="Fundraiser">Fundraiser</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="new-notes" placeholder="Any early details, client name, or context..."></textarea>
        </div>

        <button class="btn-create" id="btn-create" onclick="createEvent()">
          + Create Event
        </button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete Event?</h3>
      <p id="modal-msg">This will permanently delete this event and all associated data. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCfgmw0XlHj3BY9A-CS1-u_n4TDUuTNqmM",
      authDomain: "digital-dashh.firebaseapp.com",
      projectId: "digital-dashh",
      storageBucket: "digital-dashh.appspot.com",
      messagingSenderId: "535613848097",
      appId: "1:535613848097:web:bcd4a58bf1bd9497e48160"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userEvents = [];
    let pendingDeleteId = null;
    let activeEventId = localStorage.getItem('activeEventId');

    // ── AUTH GUARD ──
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      document.getElementById('user-email').textContent = user.email;
      loadEvents();
    });

    // ── LOAD EVENTS ──
    function loadEvents() {
      db.collection('users').doc(currentUser.uid).collection('events')
        .orderBy('createdAt', 'desc')
        .get()
        .then(snapshot => {
          document.getElementById('skeleton').remove();
          userEvents = [];
          snapshot.forEach(doc => {
            userEvents.push({ id: doc.id, ...doc.data() });
          });
          renderEvents();
          updateActiveBanner();
        })
        .catch(err => {
          console.error(err);
          document.getElementById('skeleton').remove();
          renderEvents(); // render empty state
        });
    }

    // ── RENDER EVENTS ──
    function renderEvents() {
      const list = document.getElementById('events-list');
      list.innerHTML = '';

      if (userEvents.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No events yet</h3>
            <p>Create your first event using the form →</p>
          </div>`;
        return;
      }

      userEvents.forEach(event => {
        const isActive = event.id === activeEventId;
        const badge = getStatusBadge(event.eventDate);
        const dateStr = event.eventDate
          ? new Date(event.eventDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
          : 'Date TBD';

        const card = document.createElement('div');
        card.className = `event-card${isActive ? ' active-event' : ''}`;
        card.innerHTML = `
          <div class="event-card-info">
            <div class="event-card-name">${escHtml(event.eventName || 'Untitled Event')}</div>
            <div class="event-card-meta">
              ${event.eventLocation ? `<span>📍 ${escHtml(event.eventLocation)}</span>` : ''}
              <span>📅 ${dateStr}</span>
              ${event.eventType ? `<span>🏷️ ${escHtml(event.eventType)}</span>` : ''}
              ${event.eventCapacity ? `<span>👥 ${event.eventCapacity} cap.</span>` : ''}
            </div>
          </div>
          <div class="event-card-badges">
            <span class="badge ${badge.cls}">${badge.label}</span>
            <button
              class="btn-select${isActive ? ' selected' : ''}"
              onclick="selectEvent('${event.id}', event)"
            >${isActive ? '✓ Active' : 'Open'}</button>
            <button
              class="btn-delete-event"
              title="Delete event"
              onclick="openDeleteModal('${event.id}', '${escHtml(event.eventName || 'this event')}', event)"
            >✕</button>
          </div>`;
        list.appendChild(card);
      });
    }

    // ── SELECT EVENT ──
    function selectEvent(eventId, e) {
      e.stopPropagation();
      activeEventId = eventId;
      localStorage.setItem('activeEventId', eventId);

      // Update UI
      renderEvents();
      updateActiveBanner();
      showToast('✅ Event activated! Opening dashboard...', 'success');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1200);
    }

    // ── ACTIVE BANNER ──
    function updateActiveBanner() {
      const banner = document.getElementById('active-banner');
      if (!activeEventId) { banner.style.display = 'none'; return; }

      const event = userEvents.find(e => e.id === activeEventId);
      if (!event) { banner.style.display = 'none'; return; }

      banner.style.display = 'flex';
      document.getElementById('active-banner-name').textContent = event.eventName || 'Untitled Event';

      const parts = [];
      if (event.eventLocation) parts.push(event.eventLocation);
      if (event.eventDate) {
        const d = new Date(event.eventDate + 'T00:00:00');
        const diff = Math.ceil((d - new Date()) / (1000 * 60 * 60 * 24));
        parts.push(diff > 0 ? `${diff} days away` : diff === 0 ? 'Today!' : `${Math.abs(diff)} days ago`);
      }
      document.getElementById('active-banner-meta').textContent = parts.join(' · ') || 'No additional details';
    }

    // ── CREATE EVENT ──
    function createEvent() {
      const name = document.getElementById('new-name').value.trim();
      if (!name) {
        showToast('⚠️ Please enter an event name.', 'error');
        document.getElementById('new-name').focus();
        return;
      }

      const btn = document.getElementById('btn-create');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      const eventData = {
        eventName: name,
        eventLocation: document.getElementById('new-location').value.trim(),
        eventDate: document.getElementById('new-date').value || null,
        eventCapacity: parseInt(document.getElementById('new-capacity').value) || null,
        eventType: document.getElementById('new-type').value,
        notes: document.getElementById('new-notes').value.trim(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        attendees: [],
        budget: { total: 0, spent: 0 }
      };

      db.collection('users').doc(currentUser.uid).collection('events')
        .add(eventData)
        .then(docRef => {
          // Auto-select the new event
          activeEventId = docRef.id;
          localStorage.setItem('activeEventId', docRef.id);

          // Clear form
          ['new-name','new-location','new-date','new-capacity','new-notes'].forEach(id => {
            document.getElementById(id).value = '';
          });
          document.getElementById('new-type').value = '';

          userEvents.unshift({ id: docRef.id, ...eventData });
          renderEvents();
          updateActiveBanner();
          showToast('🎉 Event created and activated!', 'success');

          btn.disabled = false;
          btn.textContent = '+ Create Event';
        })
        .catch(err => {
          console.error(err);
          showToast('❌ Failed to create event. Try again.', 'error');
          btn.disabled = false;
          btn.textContent = '+ Create Event';
        });
    }

    // ── DELETE EVENT ──
    function openDeleteModal(eventId, eventName, e) {
      e.stopPropagation();
      pendingDeleteId = eventId;
      document.getElementById('modal-msg').textContent =
        `Permanently delete "${eventName}"? All event data will be lost. This cannot be undone.`;
      document.getElementById('delete-modal').classList.add('open');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      pendingDeleteId = null;
    }

    function confirmDelete() {
      if (!pendingDeleteId) return;
      const id = pendingDeleteId;
      closeDeleteModal();

      db.collection('users').doc(currentUser.uid).collection('events').doc(id)
        .delete()
        .then(() => {
          userEvents = userEvents.filter(e => e.id !== id);
          if (activeEventId === id) {
            activeEventId = null;
            localStorage.removeItem('activeEventId');
          }
          renderEvents();
          updateActiveBanner();
          showToast('🗑️ Event deleted.', 'success');
        })
        .catch(err => {
          console.error(err);
          showToast('❌ Failed to delete event.', 'error');
        });
    }

    // ── STATUS BADGE ──
    function getStatusBadge(dateStr) {
      if (!dateStr) return { cls: 'badge-upcoming', label: 'No Date' };
      const d = new Date(dateStr + 'T00:00:00');
      const today = new Date();
      today.setHours(0,0,0,0);
      const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
      if (diff < 0) return { cls: 'badge-past', label: 'Past' };
      if (diff <= 7) return { cls: 'badge-active', label: 'This Week' };
      return { cls: 'badge-upcoming', label: 'Upcoming' };
    }

    // ── TOAST ──
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    // ── LOGOUT ──
    function logout() {
      auth.signOut().then(() => { window.location.href = 'login.html'; });
    }

    // ── UTILS ──
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Allow Enter key to create event
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement.closest('.create-panel')) {
        createEvent();
      }
    });
  </script>
</body>
</html>
